<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Scoreboard & Schedules PWA</title>
  
  <link rel="apple-touch-icon" sizes="512x512" href="https://hcforever.nekoweb.org/mo2.png">
  <link rel="manifest" href="/manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0b0f19;
      --bg-gradient: radial-gradient(circle at top, #1e293b 0%, #0f172a 60%, #080c14 100%);
      
      --glass-surface: rgba(30, 41, 59, 0.45);
      --glass-surface-hover: rgba(51, 65, 85, 0.55);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-bright: rgba(255, 255, 255, 0.18);
      --glass-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --glass-blur: blur(16px);
      
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-primary: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.25);
      --pinned-accent: #f59e0b;
      --pinned-glow: rgba(245, 158, 11, 0.2);
      
      --success-green: #22c55e;
      --success-glow: rgba(34, 197, 94, 0.2);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      
      --transition-fast: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-dark);
      background-image: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    /* Header Architecture */
    header {
      width: 100%;
      background: var(--glass-surface);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      position: sticky;
      top: 0;
      z-index: 90;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 0 0.75rem 0;
      gap: 0.85rem;
    }

    .header-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 1100px;
      padding: 0 1.25rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Navigation Bar */
    nav {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 0.4rem;
      width: 100%;
      max-width: 1100px;
      padding: 0 1.25rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    nav::-webkit-scrollbar {
      display: none;
    }

    nav button {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      padding: 0.45rem 0.9rem;
      border-radius: var(--radius-sm);
      font-size: 0.825rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    nav button:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    nav button.active {
      background: rgba(56, 189, 248, 0.12);
      border-color: rgba(56, 189, 248, 0.3);
      color: var(--accent-primary);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* Filter Panel */
    .controls-wrapper {
      width: 100%;
      max-width: 1100px;
      padding: 0 1.25rem;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--glass-border);
      padding: 0.5rem;
      border-radius: var(--radius-md);
    }

    .controls input, .controls select, .controls button, #global-push-btn {
      background: var(--glass-surface);
      color: var(--text-main);
      border: 1px solid var(--glass-border);
      padding: 0.45rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 500;
      outline: none;
      transition: var(--transition-fast);
    }

    .controls input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8);
      cursor: pointer;
    }

    .controls input:focus, .controls select:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    button {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      user-select: none;
    }

    button:hover {
      background: var(--glass-surface-hover);
      border-color: var(--glass-border-bright);
    }

    #apply-filters {
      background: var(--accent-primary);
      color: var(--bg-dark);
      border-color: var(--accent-primary);
      font-weight: 600;
    }

    #apply-filters:hover {
      background: #7dd3fc;
      border-color: #7dd3fc;
    }

    /* Main Dashboard Layout */
    main {
      width: 100%;
      max-width: 1100px;
      padding: 1.5rem 1.25rem;
      flex: 1;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.25rem;
    }

    /* Game Card */
    .game-card {
      background: var(--glass-surface);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius-md);
      padding: 1rem 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      transition: var(--transition-fast);
      position: relative;
    }

    .game-card:hover {
      transform: translateY(-3px);
      border-color: var(--glass-border-bright);
    }

    .game-card.pinned {
      border-color: rgba(245, 158, 11, 0.4);
      box-shadow: 0 0 20px var(--pinned-glow);
      order: -1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 0.5rem;
    }

    .status {
      font-size: 0.725rem;
      color: var(--accent-primary);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .pin-btn {
      background: transparent;
      border: none;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1;
      font-weight: 600;
    }

    .pin-btn:hover, .pin-btn.active {
      color: var(--pinned-accent);
      background: rgba(245, 158, 11, 0.12);
    }

    /* Teams & Scores */
    .team {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.15rem 0;
    }

    .team-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .team-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .team-details {
      display: flex;
      flex-direction: column;
    }

    .team-name {
      font-weight: 600;
      font-size: 0.925rem;
      line-height: 1.25;
    }

    .team-record {
      font-size: 0.725rem;
      color: var(--text-muted);
    }

    .score {
      font-weight: 700;
      font-size: 1.35rem;
      font-variant-numeric: tabular-nums;
    }

    /* Card Action Toolbar & Heroicons */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding-top: 0.4rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .card-actions button {
      font-size: 0.725rem;
      padding: 0.35rem 0.5rem;
      border-radius: var(--radius-sm);
      flex: 1;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
    }

    .card-actions button:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-push {
      flex: 0 0 auto !important;
      padding: 0.35rem 0.6rem !important;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
    }

    .btn-push svg {
      width: 18px;
      height: 18px;
      transition: var(--transition-fast);
    }

    .btn-push.inactive svg {
      color: var(--text-muted);
    }

    .btn-push.inactive:hover {
      border-color: var(--glass-border-bright);
    }

    .btn-push.inactive:hover svg {
      color: var(--text-main);
    }

    .btn-push.active {
      background: rgba(34, 197, 94, 0.12) !important;
      border-color: rgba(34, 197, 94, 0.3) !important;
      box-shadow: 0 0 10px var(--success-glow);
    }

    .btn-push.active svg {
      color: var(--success-green);
    }

    /* Modals & Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 15, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: #0f172a;
      border: 1px solid var(--glass-border-bright);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 550px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 1.5rem;
      position: relative;
      scroll-behavior: smooth;
    }

    .modal-sticky-header {
      position: sticky;
      top: -1.5rem;
      background: #0f172a;
      padding: 0 0 1rem 0;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-sticky-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      padding: 0 4px;
    }

    .modal-close:hover {
      color: var(--text-main);
    }

    .loading, .error {
      text-align: center;
      grid-column: 1 / -1;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .list-item {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .list-item.upcoming-game {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: var(--radius-sm);
      padding: 0.75rem 0.5rem;
      margin: 0.25rem 0;
    }

    .upcoming-tag {
      font-size: 0.65rem;
      font-weight: 700;
      background: var(--accent-primary);
      color: var(--bg-dark);
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      text-transform: uppercase;
    }

    /* Toast System - Positioned Top Right */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 360px;
      width: calc(100% - 40px);
    }

    .toast {
      position: relative;
      background: #0f172a;
      color: #fff;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border-bright);
      border-left: 4px solid var(--accent-primary);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      font-size: 0.825rem;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
      animation: fadeIn 0.25s ease;
    }

    .toast::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 100%;
      background: var(--accent-glow);
      z-index: 0;
      animation: progressCountdown 10s linear forwards;
    }

    .toast.pinned::before {
      animation-play-state: paused;
      background: var(--pinned-glow);
    }

    .toast.pinned {
      border-left-color: var(--pinned-accent);
    }

    .toast-logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
      z-index: 1;
    }

    .toast-content {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      z-index: 1;
    }

    .toast-event-type {
      font-size: 0.675rem;
      font-weight: 700;
      color: var(--accent-primary);
      text-transform: uppercase;
    }

    .toast-score {
      font-weight: 600;
      font-size: 0.875rem;
    }

    .toast-detail {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .toast-actions {
      display: flex;
      gap: 2px;
      z-index: 1;
    }

    .toast-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 4px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes progressCountdown {
      from { width: 100%; }
      to { width: 0%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title-row">
      <h1>Sports Center</h1>
      <button id="global-push-btn">Enable Alerts</button>
    </div>
    
    <nav id="league-nav">
      <button data-sport="baseball" data-league="mlb" class="active">MLB</button>
      <button data-sport="football" data-league="nfl">NFL</button>
      <button data-sport="basketball" data-league="nba">NBA</button>
      <button data-sport="hockey" data-league="nhl">NHL</button>
      <button data-sport="soccer" data-league="eng.1">Premier League</button>
    </nav>

    <div class="controls-wrapper">
      <div class="controls">
        <input type="date" id="param-date">
        <select id="param-seasontype">
          <option value="">All Seasons</option>
          <option value="1">Preseason</option>
          <option value="2">Regular Season</option>
          <option value="3">Postseason</option>
        </select>
        <button id="apply-filters">Apply Filters</button>
      </div>
    </div>
  </header>

  <main>
    <div id="scoreboard" class="scoreboard">
      <div class="loading">Loading scores...</div>
    </div>
  </main>

  <div id="modal" class="modal-overlay">
    <div class="modal-content" id="modal-scroll-container">
      <div class="modal-sticky-header">
        <h2 id="modal-title">Details</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div id="modal-body">Loading details...</div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";
    import { getFirestore, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB_ExrYOQfmaYQqqS9lof8klY9Y8Qbrbc8",
      authDomain: "webpush721.firebaseapp.com",
      projectId: "webpush721",
      storageBucket: "webpush721.firebasestorage.app",
      messagingSenderId: "638081013513",
      appId: "1:638081013513:web:88960958d7e8f12be325d8",
      measurementId: "G-ZE56P5MBX6"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const messaging = getMessaging(app);
    const db = getFirestore(app);

    let fcmToken = localStorage.getItem('fcmToken') || null;
    let subscribedTopics = new Set(JSON.parse(localStorage.getItem('subscribedTopics') || '[]'));

    const VAPID_PUBLIC_KEY = 'BEgs6yLKrhZ9Ayb_R4jRVkEmwplVWgM4vGwXojCDCoyw1fvb-qaADXv_j-Xi5KRX4_VQqRxlxLuXoD5g09vQWlg';

    let currentSport = 'baseball';
    let currentLeague = 'mlb';
    let pollInterval = null;
    let countdownInterval = null;
    let activeModalView = null;
    
    let gameCache = new Map();
    let liveToastMap = new Map();
    let startAlertedGames = new Set();
    let finalAlertedGames = new Set(JSON.parse(localStorage.getItem('finalAlertedGames') || '[]'));
    let seenPlayIds = new Set();
    let pinnedGames = new Set(JSON.parse(localStorage.getItem('pinnedGames') || '[]'));
    let pushGames = new Set(JSON.parse(localStorage.getItem('pushGames') || '[]'));

    // Heroicons SVG Strings
    const BELL_ICON = `
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
      </svg>
    `;

    const CHECK_ICON = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12Zm13.36-1.814a.75.75 0 1 0-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 0 0-1.06 1.06l2.25 2.25a.75.75 0 0 0 1.14-.094l4.25-5.938Z" clip-rule="evenodd" />
      </svg>
    `;

    const scoreboardEl = document.getElementById('scoreboard');
    const navEl = document.getElementById('league-nav');
    const modalEl = document.getElementById('modal');
    const modalTitleEl = document.getElementById('modal-title');
    const modalBodyEl = document.getElementById('modal-body');
    const dateInputEl = document.getElementById('param-date');

    function setDefaultDateFilter() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      dateInputEl.value = `${year}-${month}-${day}`;
    }

    window.togglePin = togglePin;
    window.togglePushAlerts = togglePushAlerts;
    window.fetchSchedule = fetchSchedule;

    function initFirebaseUI() {
      const pushBtn = document.getElementById('global-push-btn');

      if (fcmToken) {
        pushBtn.textContent = "Alerts Active";
        pushBtn.style.opacity = "0.7";
      }

      pushBtn.addEventListener('click', async () => {
        if (typeof Notification === 'undefined') {
          showToast('system', 'ERROR', 'Notifications are blocked in Safari. You must tap Share and select Add to Home Screen first!', '');
          pushBtn.textContent = "Enable Alerts";
          return;
        }

        pushBtn.textContent = "Connecting...";
        try {
          const permission = await Notification.requestPermission();
          
          if (permission === 'granted') {
            const token = await getToken(messaging, { vapidKey: VAPID_PUBLIC_KEY });
            if (token) {
              fcmToken = token;
              localStorage.setItem('fcmToken', token);
              pushBtn.textContent = "Alerts Active";
              pushBtn.style.opacity = "0.7";
              showToast('system', 'ALERT', 'Push notifications active!', '');
              fetchScores(true);
            } else {
              showToast('system', 'NOTICE', 'Token generation failed.', '');
              pushBtn.textContent = "Enable Alerts";
            }
          } else {
            showToast('system', 'NOTICE', 'Notification permission denied.', '');
            pushBtn.textContent = "Enable Alerts";
          }
        } catch (err) {
          console.error(err);
          showToast('system', 'ERROR', `Notification setup failed: ${err.message}`, '');
          pushBtn.textContent = "Enable Alerts";
        }
      });

      onMessage(messaging, (payload) => {
        showToast('fcm', 'PUSH ALERT', payload.notification?.title || 'Alert', payload.notification?.body || '');
      });

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(console.error);
      }
    }

    async function toggleNotificationSubscription(type, targetId, targetName) {
      if (!fcmToken) {
        showToast('system', 'NOTICE', "Enable alerts in header first!", '');
        return false;
      }

      const topicName = `${type}_${targetId}`;
      const isSubscribed = subscribedTopics.has(topicName);

      try {
        const docRef = doc(db, "subscriptions", `${fcmToken}_${topicName}`);
        if (isSubscribed) {
          await deleteDoc(docRef);
          subscribedTopics.delete(topicName);
          showToast('system', 'SUBSCRIPTION', `Alerts disabled: ${targetName}`, '');
        } else {
          await setDoc(docRef, { token: fcmToken, topic: topicName, createdAt: Date.now() });
          subscribedTopics.add(topicName);
          showToast('system', 'SUBSCRIPTION', `Alerts enabled: ${targetName}`, '');
        }
        localStorage.setItem('subscribedTopics', JSON.stringify([...subscribedTopics]));
        fetchScores(true);
        return true;
      } catch (err) {
        console.error(err);
        showToast('system', 'ERROR', `Database Error: ${err.message}`, '');
        return false;
      }
    }

    function classifyBaseballPlay(text) {
      if (!text) return { type: 'SCORING PLAY', detail: '' };
      const upper = text.toUpperCase();

      if (upper.includes('GRAND SLAM')) return { type: 'GRAND SLAM', detail: text };
      if (upper.includes('HOME RUN') || upper.includes('HOMERUN')) return { type: 'HOME RUN', detail: text };
      if (upper.includes('DOUBLE')) return { type: 'RBI DOUBLE', detail: text };
      if (upper.includes('TRIPLE')) return { type: 'RBI TRIPLE', detail: text };
      if (upper.includes('SINGLE')) return { type: 'RBI SINGLE', detail: text };
      if (upper.includes('SACRIFICE FLY') || upper.includes('SAC FLY')) return { type: 'SAC FLY', detail: text };
      if (upper.includes('WALK') || upper.includes('BASES LOADED')) return { type: 'WALK / RBI', detail: text };
      
      return { type: 'SCORING PLAY', detail: text };
    }

    async function checkNFLScoringPlays(eventId, awayName, homeName, currentAwayScore, currentHomeScore, scoringTeamLogo, statusText) {
      try {
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/football/nfl/summary?event=${eventId}`);
        if (!res.ok) return;
        const data = await res.json();
        const scoringPlays = (data.plays || []).filter(p => p.scoringPlay || p.type?.text?.toLowerCase().includes('score'));

        if (scoringPlays.length > 0) {
          const lastPlay = scoringPlays[scoringPlays.length - 1];
          const playId = lastPlay.id || lastPlay.text;

          if (!seenPlayIds.has(playId)) {
            seenPlayIds.add(playId);
            showToast(eventId, 'TOUCHDOWN / FIELD GOAL', `${awayName} ${currentAwayScore} - ${currentHomeScore} ${homeName} (${statusText || 'Live'})`, lastPlay.text, scoringTeamLogo);
          }
        }
      } catch (err) {
        console.error('NFL Play Check Error:', err);
      }
    }

    function showToast(eventId, eventType, scoreText, detailText, logoUrl = null) {
      const container = document.getElementById('toast-container');
      
      if (liveToastMap.has(eventId)) {
        const existingToast = liveToastMap.get(eventId);
        if (existingToast && container.contains(existingToast)) {
          const typeEl = existingToast.querySelector('.toast-event-type');
          const scoreEl = existingToast.querySelector('.toast-score');
          const detailEl = existingToast.querySelector('.toast-detail');
          const logoEl = existingToast.querySelector('.toast-logo');

          if (typeEl) typeEl.textContent = eventType;
          if (scoreEl) scoreEl.textContent = scoreText;
          if (detailEl) detailEl.textContent = detailText;
          if (logoEl && logoUrl) logoEl.src = logoUrl;
          return;
        }
      }

      const toast = document.createElement('div');
      toast.className = 'toast';

      const actionIconsSvg = `
        <div class="toast-actions">
          <button class="toast-btn toast-pin-btn" title="Pin Alert">Pin</button>
          <button class="toast-btn toast-dismiss-btn" title="Dismiss">Dismiss</button>
        </div>
      `;

      let innerContent = '';
      if (logoUrl) {
        innerContent += `<img src="${logoUrl}" class="toast-logo" alt="Logo">`;
      }
      innerContent += `
        <div class="toast-content">
          <span class="toast-event-type">${eventType}</span>
          <span class="toast-score">${scoreText}</span>
          <span class="toast-detail">${detailText || ''}</span>
        </div>
        ${actionIconsSvg}
      `;

      toast.innerHTML = innerContent;
      container.appendChild(toast);
      liveToastMap.set(eventId, toast);

      let isPinned = false;
      let dismissTimeout = setTimeout(() => { if (!isPinned) removeToast(); }, 10000);

      function removeToast() {
        toast.style.opacity = '0';
        setTimeout(() => { toast.remove(); liveToastMap.delete(eventId); }, 250);
      }

      toast.querySelector('.toast-pin-btn').addEventListener('click', () => {
        isPinned = !isPinned;
        toast.classList.toggle('pinned', isPinned);
        if (isPinned) clearTimeout(dismissTimeout);
      });

      toast.querySelector('.toast-dismiss-btn').addEventListener('click', () => {
        clearTimeout(dismissTimeout);
        removeToast();
      });
    }

    function togglePin(eventId) {
      if (pinnedGames.has(eventId)) pinnedGames.delete(eventId);
      else pinnedGames.add(eventId);
      localStorage.setItem('pinnedGames', JSON.stringify([...pinnedGames]));
      fetchScores(true);
    }

    async function togglePushAlerts(eventId, eventName = 'Game') {
      if (!fcmToken) {
        showToast('system', 'NOTICE', 'Enable alerts in header first!', '');
        return;
      }

      const success = await toggleNotificationSubscription('game', eventId, eventName);
      if (success) {
        if (pushGames.has(eventId)) pushGames.delete(eventId);
        else pushGames.add(eventId);
        localStorage.setItem('pushGames', JSON.stringify([...pushGames]));
        fetchScores(true);
      }
    }

    function formatGameStatus(event) {
      const state = event.status?.type?.state;
      const gameDate = new Date(event.date);

      if (state !== 'pre') return event.status?.type?.detail || 'Live';

      const dateStr = `${gameDate.getMonth() + 1}/${gameDate.getDate()}`;
      const timeStr = gameDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      const totalMinutes = Math.floor((gameDate.getTime() - Date.now()) / (1000 * 60));

      if (totalMinutes >= 0 && totalMinutes <= 5 && !startAlertedGames.has(event.id)) {
        startAlertedGames.add(event.id);
        const comp = event.competitions[0];
        const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[0];
        const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[1];
        showToast(event.id, 'GAME START', `Starts in ${totalMinutes}m`, `${away.team.shortDisplayName} @ ${home.team.shortDisplayName}`, home.team.logo);
      }

      if (totalMinutes <= 0) return `${dateStr} ${timeStr} • Starting Soon`;
      const hours = Math.floor(totalMinutes / 60);
      const mins = totalMinutes % 60;
      return `${dateStr} ${timeStr} • ${hours > 0 ? `${hours}h ${mins}m` : `${mins}m`}`;
    }

    function updateCountdowns() {
      document.querySelectorAll('.game-card').forEach(card => {
        const cached = gameCache.get(card.getAttribute('data-event-id'));
        if (cached?.event) {
          const statusEl = card.querySelector('.status');
          if (statusEl) statusEl.textContent = formatGameStatus(cached.event);
        }
      });
    }

    async function checkMLBScoringPlays(eventId, awayName, homeName, currentAwayScore, currentHomeScore, scoringTeamLogo, inningText) {
      try {
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/summary?event=${eventId}`);
        if (!res.ok) return;
        const data = await res.json();
        const scoringPlays = (data.plays || []).filter(p => p.scoringPlay || p.type?.text?.toLowerCase().includes('score'));

        if (scoringPlays.length > 0) {
          const lastPlay = scoringPlays[scoringPlays.length - 1];
          const playId = lastPlay.id || lastPlay.text;

          if (!seenPlayIds.has(playId)) {
            seenPlayIds.add(playId);
            const classified = classifyBaseballPlay(lastPlay.text);
            showToast(eventId, classified.type, `${awayName} ${currentAwayScore} - ${currentHomeScore} ${homeName} (${inningText || 'Live'})`, classified.detail, scoringTeamLogo);
          }
        }
      } catch (err) {
        console.error('MLB Play Check Error:', err);
      }
    }

    async function fetchScores(isSilent = false) {
      if (!isSilent) scoreboardEl.innerHTML = '<div class="loading">Fetching live games...</div>';
      
      const params = new URLSearchParams();
      const dateVal = dateInputEl.value.replace(/-/g, '');
      const seasonTypeVal = document.getElementById('param-seasontype').value;

      if (dateVal) params.append('dates', dateVal);
      if (seasonTypeVal) params.append('seasontype', seasonTypeVal);

      const url = `https://site.api.espn.com/apis/site/v2/sports/${currentSport}/${currentLeague}/scoreboard${params.toString() ? '?' + params.toString() : ''}`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('API Request Failed');
        const data = await response.json();
        updateScoreboardDOM(data.events || [], isSilent);

        if (activeModalView?.type === 'schedule') {
          fetchSchedule(activeModalView.id, activeModalView.name, true);
        }
      } catch (err) {
        if (!isSilent) scoreboardEl.innerHTML = `<div class="error">Unable to fetch scores. Please try again.</div>`;
      }
    }

    function getTeamRecord(competitor) {
      if (!competitor.records?.length) return '';
      const rec = competitor.records.find(r => r.type === 'total' || r.type === 'overall') || competitor.records[0];
      return rec?.summary ? `(${rec.summary})` : '';
    }

    function updateScoreboardDOM(events, isSilent = false) {
      if (events.length === 0) {
        scoreboardEl.innerHTML = '<div class="loading">No games found for this selection.</div>';
        return;
      }

      if (scoreboardEl.querySelector('.loading, .error')) scoreboardEl.innerHTML = '';

      const existingCards = new Map();
      scoreboardEl.querySelectorAll('.game-card').forEach(card => {
        existingCards.set(card.getAttribute('data-event-id'), card);
      });

      events.forEach(event => {
        const comp = event.competitions[0];
        const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[0];
        const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[1];

        const formattedStatus = formatGameStatus(event);
        const awayName = away.team.abbreviation || away.team.shortDisplayName;
        const homeName = home.team.abbreviation || home.team.shortDisplayName;
        const currentAwayScore = away.score ?? '-';
        const currentHomeScore = home.score ?? '-';

        if (event.status?.type?.state === 'post' && !finalAlertedGames.has(event.id)) {
          finalAlertedGames.add(event.id);
          localStorage.setItem('finalAlertedGames', JSON.stringify([...finalAlertedGames]));
          if (isSilent) {
            const winnerLogo = Number(currentAwayScore) > Number(currentHomeScore) ? away.team.logo : home.team.logo;
            showToast(event.id, 'FINAL', `${awayName} ${currentAwayScore} - ${currentHomeScore} ${homeName}`, 'Game Finished', winnerLogo);
          }
        }

        if (gameCache.has(event.id)) {
          const prev = gameCache.get(event.id);
          const awayScored = prev.awayScore !== '-' && currentAwayScore !== '-' && Number(currentAwayScore) > Number(prev.awayScore);
          const homeScored = prev.homeScore !== '-' && currentHomeScore !== '-' && Number(currentHomeScore) > Number(prev.homeScore);

          if (awayScored || homeScored) {
            const scoringTeam = awayScored ? away : home;
            const statusDetail = event.status?.type?.detail || 'Live';

            if (currentSport === 'baseball') {
              checkMLBScoringPlays(event.id, awayName, homeName, currentAwayScore, currentHomeScore, scoringTeam.team.logo, statusDetail);
            } else if (currentSport === 'football') {
              checkNFLScoringPlays(event.id, awayName, homeName, currentAwayScore, currentHomeScore, scoringTeam.team.logo, statusDetail);
            } else {
              // FIXED: Replaced undefined variable with `statusDetail`
              showToast(
                event.id, 
                'SCORE UPDATE', 
                `${awayName} ${currentAwayScore} - ${currentHomeScore} ${homeName} (${statusDetail})`, 
                `${scoringTeam.team.displayName} scored!`, 
                scoringTeam.team.logo
              );
            }
          }
        }

        gameCache.set(event.id, { awayScore: currentAwayScore, homeScore: currentHomeScore, event });

        const isPinned = pinnedGames.has(event.id);
        const isPush = Boolean(fcmToken && pushGames.has(event.id));
        let card = existingCards.get(event.id);

        if (card) {
          card.className = `game-card ${isPinned ? 'pinned' : ''}`;
          card.querySelector('.status').textContent = formattedStatus;
          
          const pinBtn = card.querySelector('.pin-btn');
          pinBtn.className = `pin-btn ${isPinned ? 'active' : ''}`;
          pinBtn.textContent = isPinned ? 'Pinned' : 'Pin';

          const pushBtn = card.querySelector('.btn-push');
          pushBtn.className = `btn-push ${isPush ? 'active' : 'inactive'}`;
          pushBtn.title = isPush ? 'Disable push notifications' : (fcmToken ? 'Enable push notifications' : 'Enable alerts in header first');
          pushBtn.innerHTML = isPush ? CHECK_ICON : BELL_ICON;

          const scores = card.querySelectorAll('.score');
          if (scores[0]) scores[0].textContent = currentAwayScore;
          if (scores[1]) scores[1].textContent = currentHomeScore;

          existingCards.delete(event.id);
        } else {
          card = document.createElement('div');
          card.className = `game-card ${isPinned ? 'pinned' : ''}`;
          card.setAttribute('data-event-id', event.id);
          card.innerHTML = `
            <div class="card-header">
              <span class="status">${formattedStatus}</span>
              <button class="pin-btn ${isPinned ? 'active' : ''}" onclick="togglePin('${event.id}')">${isPinned ? 'Pinned' : 'Pin'}</button>
            </div>
            
            <div class="team">
              <div class="team-info">
                <img class="team-logo" src="${away.team.logo || ''}" alt="${away.team.displayName}">
                <div class="team-details">
                  <span class="team-name">${away.team.displayName}</span>
                  <span class="team-record">${getTeamRecord(away)}</span>
                </div>
              </div>
              <span class="score">${currentAwayScore}</span>
            </div>

            <div class="team">
              <div class="team-info">
                <img class="team-logo" src="${home.team.logo || ''}" alt="${home.team.displayName}">
                <div class="team-details">
                  <span class="team-name">${home.team.displayName}</span>
                  <span class="team-record">${getTeamRecord(home)}</span>
                </div>
              </div>
              <span class="score">${currentHomeScore}</span>
            </div>

            <div class="card-actions">
              <button onclick="fetchSchedule('${away.team.id}', '${away.team.displayName}')">${awayName} Sched</button>
              <button onclick="fetchSchedule('${home.team.id}', '${home.team.displayName}')">${homeName} Sched</button>
              <button class="btn-push ${isPush ? 'active' : 'inactive'}" title="${isPush ? 'Disable push notifications' : (fcmToken ? 'Enable push notifications' : 'Enable alerts in header first')}" onclick="togglePushAlerts('${event.id}', '${awayName} vs ${homeName}')">
                ${isPush ? CHECK_ICON : BELL_ICON}
              </button>
            </div>
          `;
          scoreboardEl.appendChild(card);
        }
      });

      existingCards.forEach(card => card.remove());
    }

    async function fetchSchedule(teamId, teamName, isSilent = false) {
      if (!isSilent) openModal(`${teamName} Schedule`, `Loading schedule...`);
      activeModalView = { type: 'schedule', id: teamId, name: teamName };

      try {
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${currentSport}/${currentLeague}/teams/${teamId}/schedule`);
        const data = await res.json();
        const events = data.events || [];

        if (events.length === 0) {
          modalBodyEl.innerHTML = '<p>No scheduled events found.</p>';
          return;
        }

        const now = new Date();
        let firstUpcomingIndex = events.findIndex(item => {
          const state = item.status?.type?.state;
          const itemDate = item.date ? new Date(item.date) : null;
          return state === 'pre' || state === 'in' || (itemDate && itemDate >= now);
        });

        modalBodyEl.innerHTML = events.map((item, index) => {
          const d = item.date ? new Date(item.date) : null;
          const dateStr = d ? `${d.getMonth() + 1}/${d.getDate()}` : 'TBD';
          
          const comp = item.competitions?.[0];
          let matchText = item.name;

          if (comp?.competitors) {
            const myTeam = comp.competitors.find(c => String(c.id) === String(teamId) || String(c.team?.id) === String(teamId));
            const opp = comp.competitors.find(c => String(c.id) !== String(teamId) && String(c.team?.id) !== String(teamId));
            if (opp?.team) {
              const oppName = opp.team.shortDisplayName || opp.team.abbreviation;
              matchText = (myTeam?.homeAway === 'home') ? `vs ${oppName}` : `@ ${oppName}`;
            }
          }

          const isUpcoming = (index === firstUpcomingIndex);
          const upcomingClass = isUpcoming ? 'upcoming-game' : '';
          const upcomingTag = isUpcoming ? '<span class="upcoming-tag">Upcoming</span>' : '';

          return `<div class="list-item ${upcomingClass}" ${isUpcoming ? 'id="upcoming-game-item"' : ''}>
                    <span>${dateStr} ${upcomingTag}</span>
                    <span>${matchText}</span>
                  </div>`;
        }).join('');

        if (!isSilent) {
          setTimeout(() => {
            const upcomingEl = document.getElementById('upcoming-game-item');
            if (upcomingEl) {
              upcomingEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }, 150);
        }
      } catch (err) {
        if (!isSilent) modalBodyEl.innerHTML = `<p class="error">Failed to load schedule.</p>`;
      }
    }

    function openModal(title, initialText) {
      modalTitleEl.textContent = title;
      modalBodyEl.innerHTML = `<div class="loading">${initialText}</div>`;
      modalEl.classList.add('active');
    }

    document.getElementById('modal-close').addEventListener('click', () => {
      modalEl.classList.remove('active');
      activeModalView = null;
    });

    navEl.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') {
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        currentSport = e.target.getAttribute('data-sport');
        currentLeague = e.target.getAttribute('data-league');
        fetchScores(false);
      }
    });

    document.getElementById('apply-filters').addEventListener('click', () => fetchScores(false));

    function startAutoPolling() {
      if (pollInterval) clearInterval(pollInterval);
      if (countdownInterval) clearInterval(countdownInterval);

      pollInterval = setInterval(() => fetchScores(true), 15000);
      countdownInterval = setInterval(() => updateCountdowns(), 10000);
    }

    // App Initialization
    setDefaultDateFilter();
    initFirebaseUI();
    fetchScores(false);
    startAutoPolling();
  </script>

</body>
