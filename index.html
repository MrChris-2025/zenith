<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Scoreboard & Schedules PWA</title>
  
  <link rel="apple-touch-icon" sizes="512x512" href="https://hcforever.nekoweb.org/mo2.png">
  <link rel="manifest" href="/manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b, #0f172a);
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --glass-blur: blur(12px);
      
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --accent-color: #38bdf8;
      --accent-hover: #0284c7;
      --pinned-border: #f59e0b;

      /* Button Design System */
      --btn-bg: rgba(255, 255, 255, 0.08);
      --btn-border: rgba(255, 255, 255, 0.15);
      --btn-radius: 12px;
      --btn-transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-color);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Glassmorphism Header */
    header {
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      padding: 1.2rem 0;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 90;
    }

    h1 {
      margin: 0 0 1rem 0;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0 1rem;
      margin-bottom: 1rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    .controls input, .controls select {
      background: var(--btn-bg);
      color: var(--text-color);
      border: 1px solid var(--btn-border);
      padding: 0.5rem 1rem;
      border-radius: var(--btn-radius);
      font-size: 0.85rem;
      backdrop-filter: blur(4px);
      outline: none;
      transition: var(--btn-transition);
    }

    .controls input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    /* Standard Base Button Styles */
    button {
      background: var(--btn-bg);
      color: var(--text-color);
      border: 1px solid var(--btn-border);
      padding: 0.5rem 1rem;
      border-radius: var(--btn-radius);
      font-size: 0.85rem;
      font-weight: 500;
      backdrop-filter: blur(4px);
      outline: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: var(--btn-transition);
      user-select: none;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.active {
      background: var(--accent-color);
      border-color: var(--accent-color);
      color: #0f172a;
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
    }

    main {
      width: 100%;
      max-width: 950px;
      padding: 1.5rem 1rem;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.2rem;
    }

    /* Glassmorphism Game Card */
    .game-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 16px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      transition: transform 0.2s ease, border-color 0.2s ease;
      position: relative;
    }

    .game-card.pinned {
      border-color: var(--pinned-border);
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.25);
      order: -1;
    }

    .game-card:hover {
      transform: translateY(-4px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      font-size: 0.78rem;
      color: var(--accent-color);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Icon-Only Buttons */
    .pin-btn, .modal-close, .toast-btn {
      background: transparent;
      border: none;
      padding: 4px;
      border-radius: 6px;
      color: var(--text-muted);
      backdrop-filter: none;
      line-height: 1;
    }

    .pin-btn {
      font-size: 1.2rem;
    }

    .pin-btn:hover, .pin-btn.active {
      color: var(--pinned-border);
      background: rgba(245, 158, 11, 0.15);
      box-shadow: none;
      transform: none;
    }

    .team {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .team-info {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .team-details {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .team-name {
      font-weight: 500;
      line-height: 1.2;
    }

    .team-logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .team-record {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.2;
    }

    .score {
      font-weight: 700;
      font-size: 1.2rem;
    }

    /* Streamlined Card Action Button Layout */
    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }

    .card-actions button {
      font-size: 0.75rem;
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      flex: 1;
      white-space: nowrap;
    }

    .btn-push {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }

    .btn-push:hover {
      background: rgba(34, 197, 94, 0.25);
      border-color: rgba(34, 197, 94, 0.5);
    }

    .btn-push.active {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    .btn-push.active:hover {
      background: rgba(239, 68, 68, 0.25);
      border-color: rgba(239, 68, 68, 0.5);
    }

    /* Glassmorphism Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 0 1.5rem 1.5rem 1.5rem;
      position: relative;
    }

    .modal-sticky-header {
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.95);
      padding: 1.2rem 0 1rem 0;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-sticky-header h2 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .modal-close {
      font-size: 1.5rem;
    }

    .modal-close:hover {
      color: var(--text-color);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
      transform: none;
    }

    .loading, .error {
      text-align: center;
      grid-column: 1 / -1;
      padding: 2rem;
      color: var(--text-muted);
    }

    .list-item {
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
    }

    /* Glassmorphism Toast */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 380px;
    }

    .toast {
      position: relative;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      border-left: 4px solid var(--accent-color);
      box-shadow: var(--glass-shadow);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
      transition: border-color 0.3s ease, transform 0.2s ease, opacity 0.3s ease;
    }

    .toast::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 100%;
      background: rgba(56, 189, 248, 0.15);
      z-index: 0;
      animation: progressCountdown 10s linear forwards;
    }

    .toast.pinned::before {
      animation-play-state: paused;
      background: rgba(245, 158, 11, 0.15);
      width: 100% !important;
    }

    .toast.pinned {
      border-left-color: var(--pinned-border);
    }

    .toast-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      flex-shrink: 0;
      z-index: 1;
    }

    .toast-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex-grow: 1;
      z-index: 1;
    }

    .toast-event-type {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent-color);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .toast.pinned .toast-event-type {
      color: var(--pinned-border);
    }

    .toast-score {
      font-weight: 600;
      font-size: 0.92rem;
    }

    .toast-detail {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .toast-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 1;
    }

    .toast-btn:hover {
      color: var(--text-color);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
      transform: none;
    }

    .toast-pin-btn:hover, .toast.pinned .toast-pin-btn {
      color: var(--pinned-border);
    }

    .toast-dismiss-btn:hover {
      color: #f87171;
    }

    .toast-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes progressCountdown {
      from { width: 100%; }
      to { width: 0%; }
    }
  </style>
</head>

    function initFirebaseUI() {
      const pushBtn = document.getElementById('global-push-btn');

      if (fcmToken) {
        pushBtn.textContent = "Alerts Active";
        pushBtn.style.background = "rgba(255, 255, 255, 0.08)";
        pushBtn.style.color = "var(--text-color)";
      }

      pushBtn.addEventListener('click', async () => {
        pushBtn.textContent = "Requesting Permission...";
        const permission = await Notification.requestPermission();
        
        if (permission === 'granted') {
          try {
            const token = await getToken(messaging, { vapidKey: VAPID_PUBLIC_KEY });
            if (token) {
              fcmToken = token;
              localStorage.setItem('fcmToken', token);
              pushBtn.textContent = "Alerts Active";
              pushBtn.style.background = "rgba(255, 255, 255, 0.08)";
              pushBtn.style.color = "var(--text-color)";
              showToast('system', 'ALERT', 'Push notifications successfully activated!', '');
            } else {
              showToast('system', 'NOTICE', 'Failed to retrieve push token.', '');
              pushBtn.textContent = "Enable Push Alerts";
            }
          } catch (err) {
            console.error(err);
            showToast('system', 'ERROR', 'Error retrieving push token. Check VAPID key.', '');
            pushBtn.textContent = "Enable Push Alerts";
          }
        } else {
          showToast('system', 'NOTICE', 'Notification permission denied.', '');
          pushBtn.textContent = "Enable Push Alerts";
        }
      });

      onMessage(messaging, (payload) => {
        showToast('fcm', 'PUSH ALERT', payload.notification.title, payload.notification.body);
      });

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
          .catch(err => console.error('SW Registration Failed:', err));
      }
    }

    async function toggleNotificationSubscription(type, targetId, targetName) {
      if (!fcmToken) {
        showToast('system', 'NOTICE', "Click 'Enable Push Alerts' in the header first!", '');
        return;
      }

      const topicName = `${type}_${targetId}`;
      const isSubscribed = subscribedTopics.has(topicName);

      try {
        const docRef = doc(db, "subscriptions", `${fcmToken}_${topicName}`);
        if (isSubscribed) {
          await deleteDoc(docRef);
          subscribedTopics.delete(topicName);
          showToast('system', 'SUBSCRIPTION', `Alerts disabled for ${targetName}`, '');
        } else {
          await setDoc(docRef, {
            token: fcmToken,
            topic: topicName,
            createdAt: Date.now()
          });
          subscribedTopics.add(topicName);
          showToast('system', 'SUBSCRIPTION', `Enabled score alerts for ${targetName}`, '');
        }
        localStorage.setItem('subscribedTopics', JSON.stringify([...subscribedTopics]));
        fetchScores(true);
      } catch (err) {
        console.error(err);
        showToast('system', 'ERROR', 'Could not save alert settings to Firestore.', '');
      }
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }

    function classifyBaseballPlay(text) {
      if (!text) return { type: 'SCORING PLAY', detail: '' };
      const upper = text.toUpperCase();

      if (upper.includes('GRAND SLAM')) return { type: 'GRAND SLAM', detail: text };
      if (upper.includes('HOME RUN') || upper.includes('HOMERUN')) return { type: 'HOME RUN', detail: text };
      if (upper.includes('DOUBLE')) return { type: 'RBI DOUBLE', detail: text };
      if (upper.includes('TRIPLE')) return { type: 'RBI TRIPLE', detail: text };
      if (upper.includes('SINGLE')) return { type: 'RBI SINGLE', detail: text };
      if (upper.includes('SACRIFICE FLY') || upper.includes('SAC FLY')) return { type: 'SAC FLY', detail: text };
      if (upper.includes('WALK') || upper.includes('BASES LOADED')) return { type: 'WALK / RBI', detail: text };
      if (upper.includes('WILD PITCH') || upper.includes('PASSED BALL')) return { type: 'RUN SCORED', detail: text };

      return { type: 'SCORING PLAY', detail: text };
    }

    function showToast(eventId, eventType, scoreText, detailText, logoUrl = null) {
      const container = document.getElementById('toast-container');
      
      if (liveToastMap.has(eventId)) {
        const existingToast = liveToastMap.get(eventId);
        if (existingToast && container.contains(existingToast)) {
          const typeEl = existingToast.querySelector('.toast-event-type');
          const scoreEl = existingToast.querySelector('.toast-score');
          const detailEl = existingToast.querySelector('.toast-detail');
          const logoEl = existingToast.querySelector('.toast-logo');

          if (typeEl) typeEl.textContent = eventType;
          if (scoreEl) scoreEl.textContent = scoreText;
          if (detailEl) detailEl.textContent = detailText;
          if (logoEl && logoUrl) logoEl.src = logoUrl;

          existingToast.style.transform = 'scale(1.03)';
          setTimeout(() => existingToast.style.transform = 'scale(1)', 200);
          return;
        }
      }

      const toast = document.createElement('div');
      toast.className = 'toast';

      const actionIconsSvg = `

          <button class="toast-btn toast-pin-btn" title="Pin alert">

              <path d="M13.5 2.25a.75.75 0 0 1 .75.75v3.136l2.162 2.162a.75.75 0 0 1 .222.53v2.872a.75.75 0 0 1-.75.75H13.5v7.5a.75.75 0 0 1-1.5 0v-7.5H8.116a.75.75 0 0 1-.75-.75V8.828a.75.75 0 0 1 .222-.53L9.75 6.136V3a.75.75 0 0 1 .75-.75h3z" />
            </svg>
          </button>
          <button class="toast-btn toast-dismiss-btn" title="Dismiss notification">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      `;

      let innerContent = '';
      if (logoUrl) {
        innerContent += `<img src="${logoUrl}" class="toast-logo" alt="Team Logo">`;
      }
      innerContent += `
        <div class="toast-content">
          <span class="toast-event-type">${eventType}</span>
          <span class="toast-score">${scoreText}</span>
          <span class="toast-detail">${detailText || ''}</span>
        </div>
        ${actionIconsSvg}
      `;

      toast.innerHTML = innerContent;
      container.appendChild(toast);
      liveToastMap.set(eventId, toast);

      let isPinned = false;
      let dismissTimeout = null;

      const removeToast = () => {
        toast.style.opacity = '0';
        setTimeout(() => {
          toast.remove();
          liveToastMap.delete(eventId);
        }, 300);
      };

      const scheduleDismiss = () => {
        dismissTimeout = setTimeout(() => {
          if (!isPinned) removeToast();
        }, 10000);
      };

      scheduleDismiss();

      const pinBtn = toast.querySelector('.toast-pin-btn');
      pinBtn.addEventListener('click', () => {
        isPinned = !isPinned;
        if (isPinned) {
          toast.classList.add('pinned');
          clearTimeout(dismissTimeout);
        } else {
          toast.classList.remove('pinned');
          toast.style.animation = 'none';
          toast.offsetHeight;
          toast.style.animation = null;
          scheduleDismiss();
        }
      });

      const dismissBtn = toast.querySelector('.toast-dismiss-btn');
      dismissBtn.addEventListener('click', () => {
        clearTimeout(dismissTimeout);
        removeToast();
      });
    }

    function togglePin(eventId) {
      if (pinnedGames.has(eventId)) {
        pinnedGames.delete(eventId);
      } else {
        pinnedGames.add(eventId);
      }
      localStorage.setItem('pinnedGames', JSON.stringify([...pinnedGames]));
      fetchScores(true);
    }

    async function togglePushAlerts(eventId, eventName = 'Game') {
      await toggleNotificationSubscription('game', eventId, eventName);

      const isEnabling = !pushGames.has(eventId);
      if (isEnabling) {
        pushGames.add(eventId);
      } else {
        pushGames.delete(eventId);
      }
      localStorage.setItem('pushGames', JSON.stringify([...pushGames]));
      fetchScores(true);
    }

    function formatGameStatus(event) {
      const state = event.status?.type?.state;
      const gameDate = new Date(event.date);

      if (state !== 'pre') {
        return event.status.type.detail;
      }

      const dateStr = `${gameDate.getMonth() + 1}/${gameDate.getDate()}`;
      const timeStr = gameDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

      const diffMs = gameDate.getTime() - Date.now();
      const totalMinutes = Math.floor(diffMs / (1000 * 60));

      if (totalMinutes >= 0 && totalMinutes <= 5 && !startAlertedGames.has(event.id)) {
        startAlertedGames.add(event.id);
        
        const comp = event.competitions[0];
        const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[0];
        const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[1];
        const matchup = `${away.team.shortDisplayName || away.team.displayName} @ ${home.team.shortDisplayName || home.team.displayName}`;

        showToast(
          event.id,
          'GAME START ALERT',
          `Game starts in ${totalMinutes <= 1 ? '1 min' : totalMinutes + ' mins'}`,
          matchup,
          home.team.logo
        );
      }
      
      if (diffMs <= 0) {
        return `${dateStr} ${timeStr} • Starting Soon`;
      }

      const hours = Math.floor(totalMinutes / 60);
      const mins = totalMinutes % 60;

      let countdownStr = hours > 0 ? `in ${hours}h ${mins}m` : `in ${mins}m`;
      return `${dateStr} ${timeStr} • ${countdownStr}`;
    }

    function updateCountdowns() {
      document.querySelectorAll('.game-card').forEach(card => {
        const eventId = card.getAttribute('data-event-id');
        const cached = gameCache.get(eventId);
        if (cached && cached.event) {
          const statusEl = card.querySelector('.status');
          if (statusEl) {
            statusEl.textContent = formatGameStatus(cached.event);
          }
        }
      });
    }

    async function checkMLBScoringPlays(eventId, awayName, homeName, currentAwayScore, currentHomeScore, scoringTeamLogo, inningText) {
      try {
        const summaryUrl = `https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/summary?event=${eventId}`;
        const res = await fetch(summaryUrl);
        if (!res.ok) return;
        const data = await res.json();

        const plays = data.plays || [];
        const scoringPlays = plays.filter(p => p.scoringPlay === true || p.type?.text?.toLowerCase().includes('score'));

        if (scoringPlays.length > 0) {
          const lastScoringPlay = scoringPlays[scoringPlays.length - 1];
          const playId = lastScoringPlay.id || lastScoringPlay.text;

          if (!seenPlayIds.has(playId)) {
            seenPlayIds.add(playId);
            const classified = classifyBaseballPlay(lastScoringPlay.text);
            const scoreText = `${awayName} ${currentAwayScore} - ${currentHomeScore} ${homeName} (${inningText || 'Live'})`;

            showToast(eventId, classified.type, scoreText, classified.detail, scoringTeamLogo);
          }
        }
      } catch (err) {
        console.error('Error fetching detailed MLB play text:', err);
      }
    }

    async function fetchScores(isSilent = false) {
      if (!isSilent) {
        scoreboardEl.innerHTML = '<div class="loading">Loading scores...</div>';
      }
      
      const baseUrl = `https://site.api.espn.com/apis/site/v2/sports/${currentSport}/${currentLeague}/scoreboard`;
      const params = new URLSearchParams();

      const dateVal = document.getElementById('param-date').value.replace(/-/g, '');
      const seasonTypeVal = document.getElementById('param-seasontype').value;

      if (dateVal) params.append('dates', dateVal);
      if (seasonTypeVal) params.append('seasontype', seasonTypeVal);

      const url = params.toString() ? `${baseUrl}?${params.toString()}` : baseUrl;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network response failed');
        const data = await response.json();
        updateScoreboardDOM(data.events || [], isSilent);

        if (activeModalView) {
          if (activeModalView.type === 'schedule') fetchSchedule(activeModalView.id, activeModalView.name, true);
        }
      } catch (err) {
        if (!isSilent) {
          scoreboardEl.innerHTML = `<div class="error">Unable to load scores. Check params or API availability.</div>`;
        }
      }
    }

    function getTeamRecord(competitor) {
      if (!competitor.records || competitor.records.length === 0) return '';
      const totalRecord = competitor.records.find(r => r.type === 'total' || r.type === 'overall') || competitor.records[0];
      return totalRecord?.summary ? `(${totalRecord.summary})` : '';
    }

    function updateScoreboardDOM(events, isSilent = false) {
      if (events.length === 0) {
        scoreboardEl.innerHTML = '<div class="loading">No games found for the selected criteria.</div>';
        return;
      }

      const staticMsg = scoreboardEl.querySelector('.loading, .error');
      if (staticMsg) scoreboardEl.innerHTML = '';

      const existingCards = new Map();
      scoreboardEl.querySelectorAll('.game-card').forEach(card => {
        existingCards.set(card.getAttribute('data-event-id'), card);
      });

      events.forEach(event => {
        const competition = event.competitions[0];
        const competitors = competition.competitors;
        const home = competitors.find(c => c.homeAway === 'home') || competitors[0];
        const away = competitors.find(c => c.homeAway === 'away') || competitors[1];

        const formattedStatus = formatGameStatus(event);
        const inningStatusText = event.status?.type?.detail || '';

        const awayName = away.team.abbreviation || away.team.shortDisplayName || away.team.displayName;
        const homeName = home.team.abbreviation || home.team.shortDisplayName || home.team.displayName;
        const awayRecord = getTeamRecord(away);
        const homeRecord = getTeamRecord(home);

        const currentAwayScore = away.score ?? '-';
        const currentHomeScore = home.score ?? '-';

        if (liveToastMap.has(event.id)) {
          const activeToast = liveToastMap.get(event.id);
          const scoreEl = activeToast.querySelector('.toast-score');
          if (scoreEl) {
            scoreEl.textContent = `${awayName} ${currentAwayScore} - ${currentHomeScore} ${homeName} (${inningStatusText})`;
          }
        }

        const isPostState = event.status?.type?.state === 'post';

        if (isPostState && !finalAlertedGames.has(event.id)) {
          finalAlertedGames.add(event.id);
          localStorage.setItem('finalAlertedGames', JSON.stringify([...finalAlertedGames]));
          
          if (isSilent) {
            const scoreText = `${awayName} ${currentAwayScore} - ${currentHomeScore} ${homeName}`;
            const detailText = event.status?.type?.detail || 'Game Completed';
            
            let winningLogo = home.team.logo;
            if (Number(currentAwayScore) > Number(currentHomeScore)) {
              winningLogo = away.team.logo;
            }

            showToast(event.id, 'FINAL', scoreText, detailText, winningLogo);
          }
        }

        if (gameCache.has(event.id)) {
          const prev = gameCache.get(event.id);
          const awayScored = prev.awayScore !== '-' && currentAwayScore !== '-' && Number(currentAwayScore) > Number(prev.awayScore);
          const homeScored = prev.homeScore !== '-' && currentHomeScore !== '-' && Number(currentHomeScore) > Number(prev.homeScore);

          if (awayScored || homeScored) {
            const scoringTeam = awayScored ? away : home;
            
            if (currentSport === 'baseball') {
              checkMLBScoringPlays(event.id, awayName, homeName, currentAwayScore, currentHomeScore, scoringTeam.team.logo, inningStatusText);
            } else {
              const scoreText = `${awayName} ${currentAwayScore} - ${currentHomeScore} ${homeName} (${inningStatusText})`;
              showToast(event.id, 'SCORE UPDATE', scoreText, `${scoringTeam.team.displayName} scored!`, scoringTeam.team.logo);
            }
          }
        }

        gameCache.set(event.id, { awayScore: currentAwayScore, homeScore: currentHomeScore, event });

        const isPinned = pinnedGames.has(event.id);
        const isPush = pushGames.has(event.id);

        let card = existingCards.get(event.id);

        if (card) {
          card.className = `game-card ${isPinned ? 'pinned' : ''}`;
          card.querySelector('.status').textContent = formattedStatus;
          
          const pinBtn = card.querySelector('.pin-btn');
          pinBtn.className = `pin-btn ${isPinned ? 'active' : ''}`;
          pinBtn.textContent = isPinned ? '★' : '☆';

          const pushBtn = card.querySelector('.btn-push');
          pushBtn.className = `btn-push ${isPush ? 'active' : ''}`;
          pushBtn.textContent = isPush ? 'Push On' : 'Push Off';

          const teamScores = card.querySelectorAll('.score');
          if (teamScores[0]) teamScores[0].textContent = currentAwayScore;
          if (teamScores[1]) teamScores[1].textContent = currentHomeScore;

          const teamRecords = card.querySelectorAll('.team-record');
          if (teamRecords[0]) teamRecords[0].textContent = awayRecord;
          if (teamRecords[1]) teamRecords[1].textContent = homeRecord;

          existingCards.delete(event.id);
        } else {
          card = document.createElement('div');
          card.className = `game-card ${isPinned ? 'pinned' : ''}`;
          card.setAttribute('data-event-id', event.id);
          card.innerHTML = `
            <div class="card-header">
              <span class="status">${formattedStatus}</span>
              <button class="pin-btn ${isPinned ? 'active' : ''}" onclick="togglePin('${event.id}')">${isPinned ? '★' : '☆'}</button>
            </div>
            
            <div class="team">
              <div class="team-info">
                <img class="team-logo" src="${away.team.logo || 'https://via.placeholder.com/28'}" alt="${away.team.displayName}">
                <div class="team-details">
                  <span class="team-name">${away.team.displayName}</span>
                  <span class="team-record">${awayRecord}</span>
                </div>
              </div>
              <span class="score">${currentAwayScore}</span>
            </div>

            <div class="team">
              <div class="team-info">
                <img class="team-logo" src="${home.team.logo || 'https://via.placeholder.com/28'}" alt="${home.team.displayName}">
                <div class="team-details">
                  <span class="team-name">${home.team.displayName}</span>
                  <span class="team-record">${homeRecord}</span>
                </div>
              </div>
              <span class="score">${currentHomeScore}</span>
            </div>

            <div class="card-actions">
              <button onclick="fetchSchedule('${away.team.id}', '${away.team.displayName}')">${awayName} Sched</button>
              <button onclick="fetchSchedule('${home.team.id}', '${home.team.displayName}')">${homeName} Sched</button>
              <button class="btn-push ${isPush ? 'active' : ''}" onclick="togglePushAlerts('${event.id}', '${awayName} vs ${homeName}')">${isPush ? 'Push On' : 'Push Off'}</button>
            </div>
          `;
          scoreboardEl.appendChild(card);
        }
      });

      existingCards.forEach(card => card.remove());
    }

    async function fetchSchedule(teamId, teamName, isSilent = false) {
      if (!isSilent) openModal(`${teamName} Schedule`, `Loading Schedule for ${teamName}...`);
      activeModalView = { type: 'schedule', id: teamId, name: teamName };

      const url = `https://site.api.espn.com/apis/site/v2/sports/${currentSport}/${currentLeague}/teams/${teamId}/schedule`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        const events = data.events || [];

        modalBodyEl.innerHTML = `
          ${events.length === 0 ? '<p>No scheduled events found.</p>' : ''}
          ${events.map(item => {
            let dateStr = 'TBD';
            if (item.date) {
              const d = new Date(item.date);
              dateStr = `${d.getMonth() + 1}/${d.getDate()}`;
            }
            
            const comp = item.competitions?.[0];
            let matchText = item.name;

            if (comp && comp.competitors) {
              const myTeam = comp.competitors.find(c => String(c.id) === String(teamId) || String(c.team?.id) === String(teamId));
              const opponent = comp.competitors.find(c => String(c.id) !== String(teamId) && String(c.team?.id) !== String(teamId));

              if (opponent && opponent.team) {
                const oppName = opponent.team.displayName || opponent.team.shortDisplayName || opponent.team.abbreviation;
                const isHome = myTeam ? myTeam.homeAway === 'home' : comp.competitors[0]?.id === myTeam?.id;
                matchText = isHome ? `vs ${oppName}` : `@ ${oppName}`;
              }
            }

            return `
              <div class="list-item">
                <span>${dateStr}</span>
                <span>${matchText}</span>
              </div>
            `;
          }).join('')}
        `;
      } catch (err) {
        if (!isSilent) modalBodyEl.innerHTML = `<p class="error">Failed to load team schedule.</p>`;
      }
    }

    function openModal(title, initialText) {
      modalTitleEl.textContent = title;
      modalBodyEl.innerHTML = `<div class="loading">${initialText}</div>`;
      modalEl.classList.add('active');
    }

    document.getElementById('modal-close').addEventListener('click', () => {
      modalEl.classList.remove('active');
      activeModalView = null;
    });

    navEl.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') {
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');

        currentSport = e.target.getAttribute('data-sport');
        currentLeague = e.target.getAttribute('data-league');
        fetchScores(false);
      }
    });

    document.getElementById('apply-filters').addEventListener('click', () => fetchScores(false));

    function startAutoPolling() {
      if (pollInterval) clearInterval(pollInterval);
      if (countdownInterval) clearInterval(countdownInterval);

      pollInterval = setInterval(() => {
        fetchScores(true);
      }, 15000);

      countdownInterval = setInterval(() => {
        updateCountdowns();
      }, 10000);
    }

    // Initialize App
    initFirebaseUI();
    fetchScores(false);
    startAutoPolling();
  </script>
</body>
</html>
