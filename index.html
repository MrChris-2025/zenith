<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Scoreboard & Schedules PWA</title>
  
  <link rel="apple-touch-icon" sizes="512x512" href="https://hcforever.nekoweb.org/mo2.png">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b, #0f172a);
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --glass-blur: blur(12px);
      
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --accent-color: #38bdf8;
      --accent-hover: #0284c7;
      --pinned-border: #f59e0b;
      --alert-color: #ff9100;
    }

    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-color);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Glassmorphism Header */
    header {
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      padding: 1.2rem 0;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 90;
    }

    h1 {
      margin: 0 0 1rem 0;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0 1rem;
      margin-bottom: 1rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    .controls input, .controls select, button {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-color);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      backdrop-filter: blur(4px);
      outline: none;
      transition: all 0.2s ease;
    }

    .controls input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    button {
      border-radius: 20px;
      cursor: pointer;
      font-weight: 500;
    }

    button.active, button:hover {
      background: var(--accent-color);
      border-color: var(--accent-color);
      color: #0f172a;
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
    }

    main {
      width: 100%;
      max-width: 950px;
      padding: 1.5rem 1rem;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.2rem;
    }

    /* Glassmorphism Game Card */
    .game-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 16px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      transition: transform 0.2s ease, border-color 0.2s ease;
      position: relative;
    }

    .game-card.pinned {
      border-color: var(--pinned-border);
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.25);
      order: -1;
    }

    .game-card:hover {
      transform: translateY(-4px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      font-size: 0.78rem;
      color: var(--accent-color);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-actions {
      display: flex;
      gap: 0.3rem;
    }

    .pin-btn, .alert-btn, .team-alert-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0 6px;
      backdrop-filter: none;
      font-weight: 600;
    }

    .pin-btn.active, .pin-btn:hover {
      color: var(--pinned-border);
      background: none;
      box-shadow: none;
    }

    .alert-btn.active, .alert-btn:hover, .team-alert-btn.active, .team-alert-btn:hover {
      color: var(--alert-color);
      background: none;
      box-shadow: none;
    }

    .team-alert-btn {
      font-size: 0.75rem;
      margin-left: 0.3rem;
    }

    .team {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .team-info {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .team-logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .team-record {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-left: 0.3rem;
    }

    .score {
      font-weight: 700;
      font-size: 1.2rem;
    }

    .card-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.4rem;
      flex-wrap: wrap;
    }

    .card-actions button {
      font-size: 0.75rem;
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      flex: 1;
    }

    /* Glassmorphism Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 0 1.5rem 1.5rem 1.5rem;
      position: relative;
    }

    .modal-sticky-header {
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.95);
      padding: 1.2rem 0 1rem 0;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-sticky-header h2 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--text-color);
      background: none;
      box-shadow: none;
    }

    .loading, .error {
      text-align: center;
      grid-column: 1 / -1;
      padding: 2rem;
      color: var(--text-muted);
    }

    .list-item {
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
    }

    /* Glassmorphism Toast */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 320px;
    }

    .toast {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      border-left: 4px solid var(--accent-color);
      box-shadow: var(--glass-shadow);
      font-size: 0.85rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Sports Scoreboard & Schedules</h1>
    
    <nav id="league-nav">
      <button data-sport="football" data-league="nfl" class="active">NFL</button>
      <button data-sport="basketball" data-league="nba">NBA</button>
      <button data-sport="baseball" data-league="mlb">MLB</button>
      <button data-sport="hockey" data-league="nhl">NHL</button>
      <button data-sport="soccer" data-league="eng.1">Premier League</button>
    </nav>

    <div class="controls">
      <input type="date" id="param-date">
      <select id="param-seasontype">
        <option value="">Season Type (All)</option>
        <option value="1">Preseason (1)</option>
        <option value="2">Regular Season (2)</option>
        <option value="3">Postseason (3)</option>
      </select>
      <button id="apply-filters">Apply Filters</button>
      <button id="global-push-btn" style="background: var(--alert-color); color: #0f172a; border-color: var(--alert-color);">Enable Push Alerts</button>
    </div>
  </header>

  <main>
    <div id="scoreboard" class="scoreboard">
      <div class="loading">Loading scores...</div>
    </div>
  </main>

  <div id="modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-sticky-header">
        <h2 id="modal-title">Details</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div id="modal-body">Loading details...</div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB_ExrYOQfmaYQqqS9lof8klY9Y8Qbrbc8",
      authDomain: "webpush721.firebaseapp.com",
      projectId: "webpush721",
      storageBucket: "webpush721.firebasestorage.app",
      messagingSenderId: "638081013513",
      appId: "1:638081013513:web:88960958d7e8f12be325d8",
      measurementId: "G-ZE56P5MBX6"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const messaging = getMessaging(app);

    let fcmToken = localStorage.getItem('fcmToken') || null;
    let subscribedTopics = new Set(JSON.parse(localStorage.getItem('subscribedTopics') || '[]'));

    let currentSport = 'football';
    let currentLeague = 'nfl';
    let pollInterval = null;
    let countdownInterval = null;
    let activeModalView = null;
    
    let gameCache = new Map();
    let pinnedGames = new Set(JSON.parse(localStorage.getItem('pinnedGames') || '[]'));

    const scoreboardEl = document.getElementById('scoreboard');
    const navEl = document.getElementById('league-nav');
    const modalEl = document.getElementById('modal');
    const modalTitleEl = document.getElementById('modal-title');
    const modalBodyEl = document.getElementById('modal-body');
    const pushBtn = document.getElementById('global-push-btn');

    if (fcmToken) {
      pushBtn.textContent = "Alerts Active";
      pushBtn.style.background = "rgba(255, 255, 255, 0.08)";
      pushBtn.style.color = "var(--text-color)";
    }

    pushBtn.addEventListener('click', async () => {
      pushBtn.textContent = "Requesting Permission...";
      const permission = await Notification.requestPermission();
      
      if (permission === 'granted') {
        try {
          const token = await getToken(messaging, {
            vapidKey: "BEgs6yLKrhZ9Ayb_R4jRVkEmwplVWgM4vGwXojCDCoyw1fvb-qaADXv_j-Xi5KRX4_VQqRxlxLuXoD5g09vQWlg"
          });
          
          if (token) {
            fcmToken = token;
            localStorage.setItem('fcmToken', token);
            pushBtn.textContent = "Alerts Active";
            pushBtn.style.background = "rgba(255, 255, 255, 0.08)";
            pushBtn.style.color = "var(--text-color)";
            showToast("Push notifications successfully activated!");
            console.log("FCM Token:", token);
          } else {
            showToast("Failed to retrieve push token.");
            pushBtn.textContent = "Enable Push Alerts";
          }
        } catch (err) {
          console.error(err);
          showToast("Error retrieving push token. Check VAPID key.");
          pushBtn.textContent = "Enable Push Alerts";
        }
      } else {
        showToast("Notification permission denied.");
        pushBtn.textContent = "Enable Push Alerts";
      }
    });

    onMessage(messaging, (payload) => {
      showToast(`Score Alert: ${payload.notification.title} - ${payload.notification.body}`);
    });

    async function toggleNotificationSubscription(type, targetId, targetName) {
      if (!fcmToken) {
        showToast("Click the 'Enable Push Alerts' button in the header first!");
        return;
      }

      const topicName = `${type}_${targetId}`;
      const isSubscribed = subscribedTopics.has(topicName);
      const action = isSubscribed ? "unsubscribe" : "subscribe";

      try {
        const response = await fetch("https://us-central1-webpush721.cloudfunctions.net/toggleAlert", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: fcmToken, topic: topicName, action: action })
        });

        if (!response.ok) throw new Error("Subscription failed");

        if (isSubscribed) {
          subscribedTopics.delete(topicName);
          showToast(`Alerts disabled for ${targetName}`);
        } else {
          subscribedTopics.add(topicName);
          showToast(`Enabled score alerts for ${targetName}!`);
        }
        localStorage.setItem('subscribedTopics', JSON.stringify([...subscribedTopics]));
        fetchScores(true);
      } catch (err) {
        console.error(err);
        showToast("Could not save alert settings to subscription server");
      }
    }

    window.togglePin = togglePin;
    window.fetchSummary = fetchSummary;
    window.fetchSchedule = fetchSchedule;
    window.toggleNotificationSubscription = toggleNotificationSubscription;

    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      container.appendChild(toast);

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.5s ease';
        setTimeout(() => toast.remove(), 500);
      }, 4000);
    }

    function togglePin(eventId) {
      if (pinnedGames.has(eventId)) {
        pinnedGames.delete(eventId);
      } else {
        pinnedGames.add(eventId);
      }
      localStorage.setItem('pinnedGames', JSON.stringify([...pinnedGames]));
      fetchScores(true);
    }

    function formatGameStatus(event) {
      const state = event.status?.type?.state;
      const gameDate = new Date(event.date);

      if (state !== 'pre') {
        return event.status.type.detail;
      }

      const dateStr = `${gameDate.getMonth() + 1}/${gameDate.getDate()}`;
      const timeStr = gameDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

      const diffMs = gameDate.getTime() - Date.now();
      
      if (diffMs <= 0) {
        return `${dateStr} ${timeStr} • Starting Soon`;
      }

      const totalMinutes = Math.floor(diffMs / (1000 * 60));
      const hours = Math.floor(totalMinutes / 60);
      const mins = totalMinutes % 60;

      let countdownStr = '';
      if (hours > 0) {
        countdownStr = `in ${hours}h ${mins}m`;
      } else {
        countdownStr = `in ${mins}m`;
      }

      return `${dateStr} ${timeStr} • ${countdownStr}`;
    }

    function updateCountdowns() {
      document.querySelectorAll('.game-card').forEach(card => {
        const eventId = card.getAttribute('data-event-id');
        const cached = gameCache.get(eventId);
        if (cached && cached.event) {
          const statusEl = card.querySelector('.status');
          if (statusEl) {
            statusEl.textContent = formatGameStatus(cached.event);
          }
        }
      });
    }

    async function fetchScores(isSilent = false) {
      if (!isSilent) {
        scoreboardEl.innerHTML = '<div class="loading">Loading scores...</div>';
      }
      
      const baseUrl = `https://site.api.espn.com/apis/site/v2/sports/${currentSport}/${currentLeague}/scoreboard`;
      const params = new URLSearchParams();

      const dateVal = document.getElementById('param-date').value.replace(/-/g, '');
      const seasonTypeVal = document.getElementById('param-seasontype').value;

      if (dateVal) params.append('dates', dateVal);
      if (seasonTypeVal) params.append('seasontype', seasonTypeVal);

      const url = params.toString() ? `${baseUrl}?${params.toString()}` : baseUrl;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network response failed');
        const data = await response.json();
        updateScoreboardDOM(data.events || []);

        if (activeModalView) {
          if (activeModalView.type === 'summary') fetchSummary(activeModalView.id, true);
          if (activeModalView.type === 'schedule') fetchSchedule(activeModalView.id, activeModalView.name, true);
        }
      } catch (err) {
        if (!isSilent) {
          scoreboardEl.innerHTML = `<div class="error">Unable to load scores. Check params or API availability.</div>`;
        }
      }
    }

    function getTeamRecord(competitor) {
      if (!competitor.records || competitor.records.length === 0) return '';
      const totalRecord = competitor.records.find(r => r.type === 'total' || r.type === 'overall') || competitor.records[0];
      return totalRecord?.summary ? `(${totalRecord.summary})` : '';
    }

    function updateScoreboardDOM(events) {
      if (events.length === 0) {
        scoreboardEl.innerHTML = '<div class="loading">No games found for the selected criteria.</div>';
        return;
      }

      const staticMsg = scoreboardEl.querySelector('.loading, .error');
      if (staticMsg) scoreboardEl.innerHTML = '';

      const existingCards = new Map();
      scoreboardEl.querySelectorAll('.game-card').forEach(card => {
        existingCards.set(card.getAttribute('data-event-id'), card);
      });

      events.forEach(event => {
        const competition = event.competitions[0];
        const competitors = competition.competitors;
        const home = competitors.find(c => c.homeAway === 'home') || competitors[0];
        const away = competitors.find(c => c.homeAway === 'away') || competitors[1];

        const formattedStatus = formatGameStatus(event);

        const awayName = away.team.abbreviation || away.team.shortDisplayName || away.team.displayName;
        const homeName = home.team.abbreviation || home.team.shortDisplayName || home.team.displayName;
        const awayRecord = getTeamRecord(away);
        const homeRecord = getTeamRecord(home);

        const currentAwayScore = away.score ?? '-';
        const currentHomeScore = home.score ?? '-';

        if (gameCache.has(event.id)) {
          const prev = gameCache.get(event.id);
          if (prev.awayScore !== currentAwayScore || prev.homeScore !== currentHomeScore) {
            const msg = `Score Update (${awayName} vs ${homeName}): ${awayName} ${currentAwayScore} - ${currentHomeScore} ${homeName}`;
            showToast(msg);
          }
        }

        gameCache.set(event.id, { awayScore: currentAwayScore, homeScore: currentHomeScore, event });

        const isPinned = pinnedGames.has(event.id);
        const isGameAlerted = subscribedTopics.has(`game_${event.id}`);
        const isAwayAlerted = subscribedTopics.has(`team_${away.team.id}`);
        const isHomeAlerted = subscribedTopics.has(`team_${home.team.id}`);

        let card = existingCards.get(event.id);

        if (card) {
          card.className = `game-card ${isPinned ? 'pinned' : ''}`;
          card.querySelector('.status').textContent = formattedStatus;
          
          const pinBtn = card.querySelector('.pin-btn');
          pinBtn.className = `pin-btn ${isPinned ? 'active' : ''}`;
          pinBtn.textContent = isPinned ? 'Pinned' : 'Pin';

          const alertBtn = card.querySelector('.alert-btn');
          alertBtn.className = `alert-btn ${isGameAlerted ? 'active' : ''}`;
          alertBtn.textContent = isGameAlerted ? 'Alerts On' : 'Alerts Off';

          const teamAlertBtns = card.querySelectorAll('.team-alert-btn');
          if (teamAlertBtns[0]) {
            teamAlertBtns[0].className = `team-alert-btn ${isAwayAlerted ? 'active' : ''}`;
            teamAlertBtns[0].textContent = isAwayAlerted ? 'Alerts On' : 'Alerts Off';
          }
          if (teamAlertBtns[1]) {
            teamAlertBtns[1].className = `team-alert-btn ${isHomeAlerted ? 'active' : ''}`;
            teamAlertBtns[1].textContent = isHomeAlerted ? 'Alerts On' : 'Alerts Off';
          }

          const teamScores = card.querySelectorAll('.score');
          if (teamScores[0]) teamScores[0].textContent = currentAwayScore;
          if (teamScores[1]) teamScores[1].textContent = currentHomeScore;

          const teamRecords = card.querySelectorAll('.team-record');
          if (teamRecords[0]) teamRecords[0].textContent = awayRecord;
          if (teamRecords[1]) teamRecords[1].textContent = homeRecord;

          existingCards.delete(event.id);
        } else {
          card = document.createElement('div');
          card.className = `game-card ${isPinned ? 'pinned' : ''}`;
          card.setAttribute('data-event-id', event.id);
          card.innerHTML = `
            <div class="card-header">
              <span class="status">${formattedStatus}</span>
              <div class="header-actions">
                <button class="alert-btn ${isGameAlerted ? 'active' : ''}" onclick="toggleNotificationSubscription('game', '${event.id}', '${awayName} vs ${homeName}')">${isGameAlerted ? 'Alerts On' : 'Alerts Off'}</button>
                <button class="pin-btn ${isPinned ? 'active' : ''}" onclick="togglePin('${event.id}')">${isPinned ? 'Pinned' : 'Pin'}</button>
              </div>
            </div>
            
            <div class="team">
              <div class="team-info">
                <img class="team-logo" src="${away.team.logo || 'https://via.placeholder.com/28'}" alt="${away.team.displayName}">
                <span>
                  ${away.team.displayName}
                  <span class="team-record">${awayRecord}</span>
                  <button class="team-alert-btn ${isAwayAlerted ? 'active' : ''}" onclick="toggleNotificationSubscription('team', '${away.team.id}', '${away.team.displayName}')">${isAwayAlerted ? 'Alerts On' : 'Alerts Off'}</button>
                </span>
              </div>
              <span class="score">${currentAwayScore}</span>
            </div>

            <div class="team">
              <div class="team-info">
                <img class="team-logo" src="${home.team.logo || 'https://via.placeholder.com/28'}" alt="${home.team.displayName}">
                <span>
                  ${home.team.displayName}
                  <span class="team-record">${homeRecord}</span>
                  <button class="team-alert-btn ${isHomeAlerted ? 'active' : ''}" onclick="toggleNotificationSubscription('team', '${home.team.id}', '${home.team.displayName}')">${isHomeAlerted ? 'Alerts On' : 'Alerts Off'}</button>
                </span>
              </div>
              <span class="score">${currentHomeScore}</span>
            </div>

            <div class="card-actions">
              <button onclick="fetchSummary('${event.id}')">Summary</button>
              <button onclick="fetchSchedule('${away.team.id}', '${away.team.displayName}')">${awayName} Sched</button>
              <button onclick="fetchSchedule('${home.team.id}', '${home.team.displayName}')">${homeName} Sched</button>
            </div>
          `;
          scoreboardEl.appendChild(card);
        }
      });

      existingCards.forEach(card => card.remove());
    }

    async function fetchSummary(eventId, isSilent = false) {
      if (!isSilent) openModal('Game Summary', 'Loading Game Summary...');
      activeModalView = { type: 'summary', id: eventId };

      const url = `https://site.api.espn.com/apis/site/v2/sports/${currentSport}/${currentLeague}/summary?event=${eventId}`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        
        const header = data.header?.competitions?.[0] || {};
        const boxscore = data.boxscore || {};

        modalTitleEl.textContent = data.header?.season?.name || 'Game Summary';
        modalBodyEl.innerHTML = `
          <p><strong>Venue:</strong> ${header.venue?.fullName || 'N/A'}</p>
          <h3>Teams & Leaders</h3>
          ${(boxscore.teams || []).map(t => `
            <div class="list-item">
              <span><strong>${t.team?.displayName}</strong></span>
              <span>${t.displayValue || ''}</span>
            </div>
          `).join('') || '<p>Detailed stats unavailable for this game.</p>'}
        `;
      } catch (err) {
        if (!isSilent) modalBodyEl.innerHTML = `<p class="error">Failed to load game summary.</p>`;
      }
    }

    async function fetchSchedule(teamId, teamName, isSilent = false) {
      if (!isSilent) openModal(`${teamName} Schedule`, `Loading Schedule for ${teamName}...`);
      activeModalView = { type: 'schedule', id: teamId, name: teamName };

      const url = `https://site.api.espn.com/apis/site/v2/sports/${currentSport}/${currentLeague}/teams/${teamId}/schedule`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        const events = data.events || [];

        modalBodyEl.innerHTML = `
          ${events.length === 0 ? '<p>No scheduled events found.</p>' : ''}
          ${events.map(item => {
            let dateStr = 'TBD';
            if (item.date) {
              const d = new Date(item.date);
              dateStr = `${d.getMonth() + 1}/${d.getDate()}`;
            }
            
            const comp = item.competitions?.[0];
            let matchText = item.name;

            if (comp && comp.competitors) {
              const myTeam = comp.competitors.find(c => String(c.id) === String(teamId) || String(c.team?.id) === String(teamId));
              const opponent = comp.competitors.find(c => String(c.id) !== String(teamId) && String(c.team?.id) !== String(teamId));

              if (opponent && opponent.team) {
                const oppName = opponent.team.displayName || opponent.team.shortDisplayName || opponent.team.abbreviation;
                const isHome = myTeam ? myTeam.homeAway === 'home' : comp.competitors[0]?.id === myTeam?.id;
                matchText = isHome ? `vs ${oppName}` : `@ ${oppName}`;
              }
            }

            return `
              <div class="list-item">
                <span>${dateStr}</span>
                <span>${matchText}</span>
              </div>
            `;
          }).join('')}
        `;
      } catch (err) {
        if (!isSilent) modalBodyEl.innerHTML = `<p class="error">Failed to load team schedule.</p>`;
      }
    }

    function openModal(title, initialText) {
      modalTitleEl.textContent = title;
      modalBodyEl.innerHTML = `<div class="loading">${initialText}</div>`;
      modalEl.classList.add('active');
    }

    document.getElementById('modal-close').addEventListener('click', () => {
      modalEl.classList.remove('active');
      activeModalView = null;
    });

    navEl.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') {
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');

        currentSport = e.target.getAttribute('data-sport');
        currentLeague = e.target.getAttribute('data-league');
        fetchScores(false);
      }
    });

    document.getElementById('apply-filters').addEventListener('click', () => fetchScores(false));

    function startAutoPolling() {
      if (pollInterval) clearInterval(pollInterval);
      if (countdownInterval) clearInterval(countdownInterval);

      pollInterval = setInterval(() => {
        fetchScores(true);
      }, 15000);

      countdownInterval = setInterval(() => {
        updateCountdowns();
      }, 10000);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js')
        .catch(err => console.error('SW Registration Failed:', err));
    }

    fetchScores(false);
    startAutoPolling();
  </script>
</body>
</html>
