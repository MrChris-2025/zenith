name: Check Scores and Send Notifications

on:
  schedule:
    # Runs every 2 hours EXCEPT between 2am EST (07:00 UTC) and 1pm EST (18:00 UTC)
    # Active UTC hours: 18:00, 20:00, 22:00, 00:00, 02:00, 04:00, 06:00
    - cron: '0 0,2,4,6,18,20,22 * * *'
  workflow_dispatch: # Allows manual trigger anytime in your browser

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Kills the job if it hangs for more than 10 minutes

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Execute Score Polling
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node poll-scores.mjs
